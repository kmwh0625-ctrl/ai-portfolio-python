{% extends "base.html" %}
{% block title %}텍스트 요약 데모{% endblock %}

{% block extra_css %}
<style>
  .demo-hero {
    background: linear-gradient(135deg, #1a2340 0%, #1a3a30 100%);
    color: white; padding: 60px 24px; text-align: center;
  }
  .demo-hero-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,201,167,.15); border: 1px solid rgba(0,201,167,.3);
    color: var(--accent); padding: 5px 14px; border-radius: 100px;
    font-size: 12px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .demo-hero h1 { font-family: var(--font-display); font-size: clamp(28px,4vw,46px); font-weight: 800; margin-bottom: 14px; }
  .demo-hero p { color: rgba(255,255,255,.7); font-size: 16px; }

  .demo-main { max-width: 860px; margin: 60px auto; padding: 0 24px; display: flex; flex-direction: column; gap: 24px; }

  .panel { background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow: hidden; }
  .panel-header {
    background: var(--gray-100); border-bottom: 1px solid var(--gray-200);
    padding: 18px 24px; display: flex; align-items: center; gap: 10px;
  }
  .panel-header-icon {
    width: 36px; height: 36px; border-radius: 10px; background: var(--green);
    display: flex; align-items: center; justify-content: center; color: white; font-size: 15px;
  }
  .panel-header-title { font-weight: 700; color: var(--navy); font-size: 15px; }
  .panel-body { padding: 24px; }

  textarea {
    width: 100%; min-height: 160px; border: 2px solid var(--gray-200);
    border-radius: var(--radius); padding: 16px; font-family: var(--font-kr);
    font-size: 14px; line-height: 1.7; resize: vertical; color: var(--navy);
    transition: var(--transition); outline: none; background: var(--gray-100);
  }
  textarea:focus { border-color: var(--green); background: white; }

  .char-count { text-align: right; font-size: 12px; color: var(--gray-500); margin-top: 8px; font-family: var(--font-mono); }

  .sample-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .sample-btn {
    background: var(--gray-100); border: 1px solid var(--gray-200);
    border-radius: 8px; padding: 7px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: var(--font-kr); color: var(--gray-700); transition: var(--transition);
  }
  .sample-btn:hover { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }

  .submit-btn {
    width: 100%; margin-top: 18px; padding: 15px; background: var(--green);
    color: white; border: none; border-radius: var(--radius); font-size: 15px;
    font-weight: 700; cursor: pointer; transition: var(--transition);
    display: flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font-kr);
  }
  .submit-btn:hover { background: var(--green-dark); }
  .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

  .loading-bar { height: 4px; background: var(--gray-200); border-radius: 2px; overflow: hidden; margin-top: 14px; display: none; }
  .loading-bar-fill { height: 100%; background: linear-gradient(90deg,var(--green),var(--accent),var(--green)); background-size: 200% 100%; animation: shimmer 1.2s infinite; width: 100%; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  .result-panel { display: none; }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--gray-100); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-card-num { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--green); }
  .stat-card-label { font-size: 12px; color: var(--gray-500); margin-top: 4px; }

  .summary-box {
    background: var(--green-light); border-left: 4px solid var(--green);
    border-radius: var(--radius); padding: 20px 24px;
    font-size: 15px; line-height: 1.8; color: var(--navy);
  }
  .summary-label { font-size: 11px; font-weight: 700; color: var(--green-dark); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }

  .demo-badge { background: #fef3c7; border: 1px solid #fcd34d; color: #92400e; padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-top: 16px; display: inline-block; }

  @media(max-width:600px){ .stats-row{grid-template-columns:1fr;} }
</style>
{% endblock %}

{% block content %}
<div class="demo-hero">
  <div class="demo-hero-tag"><i class="fas fa-compress-alt"></i> AI Demo</div>
  <h1>📄 텍스트 요약</h1>
  <p>긴 글을 AI가 핵심만 짧게 요약해드려요</p>
</div>

<div class="demo-main">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-header-icon"><i class="fas fa-file-alt"></i></div>
      <div class="panel-header-title">텍스트 입력 (100자 ~ 3000자)</div>
    </div>
    <div class="panel-body">
      <textarea id="textInput" placeholder="요약할 텍스트를 입력하거나 붙여넣으세요. 뉴스 기사, 보고서, 논문 등 긴 글을 짧게 요약해드립니다..." maxlength="3000" oninput="updateChar()"></textarea>
      <div class="char-count"><span id="charCount">0</span> / 3000자</div>
      <div class="sample-btns">
        <span style="font-size:12px;color:var(--gray-500);align-self:center;font-weight:600">예시:</span>
        <button class="sample-btn" onclick="setSample('news')">📰 뉴스 기사</button>
        <button class="sample-btn" onclick="setSample('tech')">💻 기술 설명</button>
      </div>
      <div class="loading-bar" id="loadingBar"><div class="loading-bar-fill"></div></div>
      <button class="submit-btn" id="submitBtn" onclick="summarize()">
        <i class="fas fa-compress-alt"></i> AI 요약 시작
      </button>
    </div>
  </div>

  <div class="panel result-panel" id="resultPanel">
    <div class="panel-header">
      <div class="panel-header-icon"><i class="fas fa-check-double"></i></div>
      <div class="panel-header-title">요약 결과</div>
    </div>
    <div class="panel-body">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-card-num" id="origLen">-</div>
          <div class="stat-card-label">원문 글자 수</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="summLen">-</div>
          <div class="stat-card-label">요약 글자 수</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-num" id="ratio">-</div>
          <div class="stat-card-label">압축률</div>
        </div>
      </div>
      <div class="summary-box">
        <div class="summary-label">✨ AI 요약 결과</div>
        <div id="summaryText"></div>
      </div>
      <div id="demoBadge"></div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const samples = {
    news: `인공지능(AI) 기술이 빠르게 발전하면서 다양한 산업에서 활용되고 있습니다. 특히 의료 분야에서는 AI를 활용한 진단 시스템이 도입되어 의사들의 업무 효율을 높이고 있습니다. 최근 연구에 따르면 AI 기반 영상 분석 시스템은 암 조기 발견율을 기존 대비 20% 이상 향상시켰습니다. 또한 자연어 처리 기술의 발전으로 챗봇과 음성 인식 시스템의 정확도도 크게 높아졌습니다. 전문가들은 향후 5년 내에 AI가 대부분의 반복적인 업무를 자동화할 것으로 전망하고 있습니다. 다만 AI 도입에 따른 일자리 변화와 윤리적 문제에 대한 사회적 논의도 활발히 이루어지고 있습니다.`,
    tech: `Django는 Python으로 작성된 오픈소스 웹 프레임워크입니다. 2005년 Lawrence Journal-World 신문사에서 처음 개발되었으며, 현재는 전 세계적으로 가장 널리 사용되는 웹 프레임워크 중 하나입니다. Django는 MTV(Model-Template-View) 패턴을 따르며, 데이터베이스 ORM, 관리자 인터페이스, 인증 시스템 등 다양한 기능을 기본으로 제공합니다. 특히 보안 측면에서 CSRF 방어, SQL 인젝션 방지, XSS 방어 등의 기능이 내장되어 있어 안전한 웹 서비스 개발에 적합합니다. Instagram, Pinterest, Disqus 등 대형 서비스들도 Django를 사용하여 구축되었습니다.`
  };

  function updateChar() {
    document.getElementById('charCount').textContent = document.getElementById('textInput').value.length;
  }

  function setSample(key) {
    document.getElementById('textInput').value = samples[key];
    updateChar();
  }

  async function summarize() {
    const text = document.getElementById('textInput').value.trim();
    if (!text) { alert('텍스트를 입력해주세요.'); return; }
    if (text.length < 100) { alert('100자 이상 입력해주세요.'); return; }

    const btn = document.getElementById('submitBtn');
    const bar = document.getElementById('loadingBar');
    btn.disabled = true;
    bar.style.display = 'block';
    document.getElementById('resultPanel').style.display = 'none';

    try {
      const res = await fetch('/ai/api/summarize/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      bar.style.display = 'none';

      if (data.success) {
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('origLen').textContent = data.original_len.toLocaleString();
        document.getElementById('summLen').textContent = data.summary_len.toLocaleString();
        document.getElementById('ratio').textContent = data.ratio + '%';
        document.getElementById('summaryText').textContent = data.summary;
        document.getElementById('demoBadge').innerHTML = data.demo
          ? '<div class="demo-badge">⚠️ 추출 요약 방식 (AI 모델 미설치 환경)</div>' : '';
      } else {
        alert('오류: ' + (data.error || '알 수 없는 오류'));
      }
    } catch (err) {
      bar.style.display = 'none';
      alert('서버 오류가 발생했습니다.');
    }
    btn.disabled = false;
  }

  function getCookie(name) {
    let val = null;
    document.cookie.split(';').forEach(c => {
      c = c.trim();
      if (c.startsWith(name + '=')) val = decodeURIComponent(c.slice(name.length + 1));
    });
    return val;
  }
</script>
{% endblock %}
